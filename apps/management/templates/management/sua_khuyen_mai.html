{% extends 'base.html' %} 

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h3 class="fw-bold"><i class="bi bi-pencil-square me-2"></i> Chỉnh sửa khuyến mãi: <span class="text-success">{{ promo.code }}</span></h3>
    <a href="{% url 'quan_ly_khuyen_mai' %}" class="btn btn-outline-secondary rounded-pill px-4">Quay lại</a>
</div>

<div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4">
        <form method="POST">
            {% csrf_token %}
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mã khuyến mãi (Code)</label>
                        <input type="text" name="code" class="form-control" value="{{ promo.code }}" required style="text-transform: uppercase;">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Mô tả (Description)</label>
                        <textarea name="description" class="form-control" rows="4" required>{{ promo.description }}</textarea>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Phần trăm giảm giá (%)</label>
                        <input type="number" name="discount_percent" class="form-control" value="{{ promo.discount_percent }}" min="1" max="100" required>
                    </div>
                    <div class="row">
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Ngày bắt đầu</label>
                            <input type="date" name="start_date" class="form-control" value="{{ promo.start_date|date:'Y-m-d' }}" required>
                        </div>
                        <div class="col-6 mb-3">
                            <label class="form-label fw-bold">Ngày kết thúc</label>
                            <input type="date" name="end_date" class="form-control" value="{{ promo.end_date|date:'Y-m-d' }}" required>
                        </div>
                    </div>
                    <div class="mb-3 mt-3 form-check form-switch">
                        <input class="form-check-input" type="checkbox" name="is_active" id="isActive" {% if promo.is_active %}checked{% endif %}>
                        <label class="form-check-label fw-bold text-success" for="isActive">Kích hoạt</label>
                    </div>
                </div>
            </div>

            <hr class="my-4">
            <div class="text-end">
                <button type="submit" class="btn btn-primary px-5 py-2 fw-bold" style="background-color: #1f7132; border-radius: 12px;">Cập nhật</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
