{% extends 'base.html' %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4 shadow-sm border-0">
                <h2 class="text-center mb-4">Đăng ký tài khoản</h2>
                {% if error %}<div class="alert alert-danger">{{ error }}</div>{% endif %}
                
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3"><input type="text" name="username" class="form-control" placeholder="Tên đăng nhập" required></div>
                    <div class="mb-3"><input type="email" name="email" class="form-control" placeholder="Email" required></div>
                    <div class="mb-3"><input type="password" name="password" class="form-control" placeholder="Mật khẩu" required></div>
                    <div class="mb-3"><input type="text" name="phone" class="form-control" placeholder="Số điện thoại"></div>
                    <div class="mb-3"><textarea name="address" class="form-control" placeholder="Địa chỉ"></textarea></div>
                    <button type="submit" class="btn-cs-primary w-100 justify-content-center" style="padding: 12px; font-size: 1.1rem;">Đăng ký</button>
                </form>
                
                <p class="text-center mt-3">
                    Đã có tài khoản? <a href="{% url 'login' %}" style="text-decoration:none;">Quay lại Đăng nhập</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
