{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .sharp-image {
        image-rendering: -webkit-optimize-contrast;
        image-rendering: crisp-edges;
    }
    body {
        font-family: 'Inter', sans-serif !important;
    }
</style>

<main class="container py-5">
    <div class="row align-items-center">
        <div class="col-lg-7 d-flex justify-content-center">
            {% if service.image %}
                <img src="{{ service.image.url }}" 
                     class="img-fluid rounded-4 shadow-lg sharp-image" 
                     alt="{{ service.name }}" 
                     style="width: 100%; max-height: 550px; object-fit: cover;">
            {% endif %}
        </div>

        <div class="col-lg-5 mt-4 mt-lg-0 ps-lg-4">
            <h1 class="fw-bold mb-3" style="font-size: 2.2rem; color: #1a1a1a;">{{ service.name }}</h1>
            <h3 class="fw-bold mb-4" style="color: #1f7132;">{{ service.price|floatformat:0 }}đ</h3>
            
            <p class="text-muted" style="line-height: 1.8; font-size: 1.1rem; text-align: justify;">
                {{ service.description }}
            </p>

<div class="bg-light p-3 rounded-3 mb-4">
    <p class="mb-0 fs-5">
        <i class="bi bi-clock me-2"></i> 
        <strong>Thời gian thực hiện:</strong> {{ service.duration_hours }} giờ
    </p>
</div>

            <a href="{% url 'booking_create' service.id %}" class="btn btn-primary btn-lg w-100 py-3 fw-bold" 
               style="background-color: #1f7132; border-color: #1f7132; border-radius: 12px;">
                Đặt lịch ngay
            </a>
        </div>
    </div>
</main>
{% endblock %}
